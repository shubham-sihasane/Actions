name: Triggers
on: 
  workflow_dispatch:
  # schedule:
  #   - cron: "* * * * *"
env:
  DOCKER_REGISTRY: docker.io
  DOCKER_IMAGE: actions-nginx
jobs:
  Docker:
    runs-on: ubuntu-latest
    steps:
      - name: Docker Build
        run: echo docker build -t ${{ env.DOCKER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
      - name: Docker Login
        run: docker login --username=${{ vars.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }}
      - name: Docker Push
        run: echo docker push ${{ env.DOCKER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
        
  Deploy:
    needs: [Docker]
    concurrency:
      group: production-deploy
      cancel-in-progress: true # Cancle previous workflow
     # cancle-in-progress: false # Wait for previous workflow to complete 
    env:
      DOCKER_REGISTRY: docker.io
      DOCKER_USERNAME: sihasaneshubham
      DOCKER_IMAGE: actions-nginx
    runs-on: ubuntu-latest
    steps:
      - name: Docker Run
        timeout-minutes: 1 # This can be added at job level & step level
        run: |
          echo docker run -d -p 80:80 ${{ env.DOCKER_REGISTRY}}/${{ vars.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          sleep 600